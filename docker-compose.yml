services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://skills:${POSTGRES_PASSWORD}@db:5432/skills
      PORT: 3000
    ports:
      - "1337:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skills
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: skills
    volumes:
      - skills-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skills -d skills"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  skills-db:
