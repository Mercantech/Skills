<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pointtavle</title>
    <script>
      if (!location.pathname.endsWith("/")) location.replace(location.pathname + "/" + location.search + location.hash);
    </script>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="scores">
    <div class="site-shell">
      <header class="page-hero">
        <div class="page-hero__overlay"></div>
        <nav class="top-nav" aria-label="Hovedmenu">
          <a class="brand-lockup nav-brand" href="../../" aria-label="Mercantec Skills forsiden">
            <span class="brand-mark" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </span>
            <span class="brand-text"><span>Mercantec</span><strong>Skills</strong></span>
          </a>
          <div class="nav-links">
            <a href="../../">Skills</a>
            <a href="../">Grupper</a>
            <a href="../audience/">Publikum</a>
            <a href="./" aria-current="page">Point</a>
          </div>
        </nav>
        <div class="page-hero__content">
          <div class="page-title-block">
            <p class="eyebrow">Vindere og chart</p>
            <h1>Point<span>tavle</span></h1>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="toolbar">
          <div>
            <p class="section-kicker">Flest point</p>
            <h2>Leaderboard</h2>
          </div>
          <div class="mini-stats">
            <div>
              <strong id="winner-name">-</strong>
              <span>foran</span>
            </div>
          </div>
        </section>

        <section class="leader-chart" aria-labelledby="leader-chart-title">
          <div class="leader-chart__head">
            <p class="section-kicker">Samlet overblik</p>
            <h2 id="leader-chart-title" class="section-heading">F&aelig;lles chart</h2>
          </div>
          <div id="leader-chart-bars" class="leader-bars"></div>
        </section>

        <section id="scoreboard" class="scoreboard" aria-live="polite"></section>
      </main>
    </div>

    <template id="score-row-template">
      <article class="score-row">
        <div class="rank"></div>
        <div>
          <h3></h3>
          <p class="owner"></p>
          <p class="split-points"></p>
        </div>
        <div class="score-meta"></div>
        <div class="score-total">
          <strong>0</strong>
          <span>point</span>
        </div>
      </article>
    </template>

    <template id="leader-bar-template">
      <article class="leader-bar">
        <div>
          <strong></strong>
          <span></span>
        </div>
        <div class="bar-track"><div class="bar-fill"></div></div>
        <strong class="bar-value">0</strong>
      </article>
    </template>

    <script src="../shared.js" defer></script>
    <script src="scores.js" defer></script>
  </body>
</html>
